baseURL = "https://galanouconsulting.com/"
themesDir = "../"
theme = "."
languageCode = "en-us"
title = "Galanou Consulting"

[module]
  [module.hugoVersion]
    extended = true
    min = "0.55.0"

[params]
  # In most cases you will only want to set the google_analytics_id OR the google_tag_manager_id. If you have Google Analytics included in your GTM tags don't put your GA ID here. Otherwise your data might be useless.
  google_analytics_id = ""
  google_tag_manager_id = ""
  favicon = "favicon-32x32.png"

  [params.homepage]
    sticky_header = true
    show_contact_box = false
    show_services_button = true

[params.logo]
  mobile = "images/logo/logo-mobile.svg"
  mobile_height = "64px"
  desktop = "images/logo/logo.svg"
  desktop_height = "72px"
  alt = "Galanou Consulting"

  [params.fonts]
    # sets the google font link in layouts/partials/google-fonts.html
    google_fonts = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap'
    heading = "Inter"
    base = "Inter"

[params.colors]
  primary = "#285347"
  black = "#1f2933"
  white = "#ffffff"
  white_offset = "#f6f2ea"
  grey = "#53606a"

  [params.seo]
    meta_twitter_site = ""
    meta_twitter_creator = ""
    meta_og_image = "images/social/galanou-consulting-social-preview.png"

  [params.services]
    summary_truncate = 120 # How many characters to include in the summary of the services before truncating

  [params.team]
    summary_large_truncate = 120 # How many characters to include in the summary of the team bios (large layout)

  [params.footer]
    copyright_text = '© Galanou Consulting. All rights reserved.'
    positioning = "Independent strategic advisor for healthcare organizations, professional societies, and mission-driven teams."

[menu]
  # Main Menu
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "Services"
    url = "/services/"
    weight = 2

  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 3

[[menu.main]]
  name = "Experience"
  url = "/thought-leadership/"
  weight = 4

  [[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 5

  # Footer Menu
  [[menu.footer]]
    name = "Home"
    url = "/"
    weight = 1

  [[menu.footer]]
    name = "Services"
    url = "/services/"
    weight = 2

  [[menu.footer]]
    name = "About"
    url = "/about/"
    weight = 3

[[menu.footer]]
  name = "Experience"
  url = "/thought-leadership/"
  weight = 4

  [[menu.footer]]
    name = "Contact"
    url = "/contact/"
    weight = 5
