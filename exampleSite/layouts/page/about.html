{{ define "body_classes" }}page-about{{ end }}

{{ define "main" }}

<div class="container pt-6 pb-6 pt-md-10 pb-md-10">
  <div class="row align-items-start">
    <div class="col-12 col-md-7">
      <h1 class="title">{{ .Title }}</h1>
      <div class="content">
        {{ .Content }}
      </div>
    </div>

    <div class="col-12 col-md-5 mt-4 mt-md-0">
      {{ with .Params.image }}
        <img
          src="{{ . | relURL }}"
          alt="Dr. Georgia Galanou Luchen"
          class="about-headshot"
        >
      {{ end }}
    </div>
  </div>
</div>

<style>
    .page-about .about-proof-box {
    margin: 26px 0;
    padding: 22px 24px;
    background: rgba(143, 132, 101, 0.10);
    border: 1px solid rgba(143, 132, 101, 0.18);
    border-left: 4px solid #2f5d50;
    border-radius: 18px;
  }

  .page-about .about-proof-box strong {
    display: block;
    margin-bottom: 8px;
    color: #2f5d50;
    font-size: 0.82rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .page-about .about-proof-box p {
    margin-bottom: 0;
    color: #3f3f3f;
    line-height: 1.58;
  }
  
  .about-headshot {
    width: 100%;
    max-width: 360px;
    height: auto;
    border-radius: 10px;
    display: block;
    margin-left: auto;
  }

  @media (max-width: 767px) {
    .about-headshot {
      max-width: 280px;
      margin: 2rem auto 0 auto;
    }
  }
</style>

{{ end }}
